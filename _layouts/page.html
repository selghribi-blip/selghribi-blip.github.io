---
layout: default
---

<!-- تخطيط الصفحات الثابتة | Static Page Layout -->
<div class="page-wrapper" style="padding: 80px 0 60px;">
  <div class="container">

    <!-- رأس الصفحة | Page Header -->
    <header class="page-header" style="text-align:center; margin-bottom: 48px; padding-bottom: 32px; border-bottom: 2px solid #e8ddd0;">
      <h1 style="color: #1a3a5c; margin-bottom: 12px;">{{ page.title }}</h1>
      {% if page.description %}
      <p style="color: #5a5a5a; font-size: 1.1rem; max-width: 600px; margin: 0 auto;">
        {{ page.description }}
      </p>
      {% endif %}
    </header>

    <!-- محتوى الصفحة | Page Content -->
    <div class="page-content {% if page.lang == 'ar' or page.lang == nil %}arabic{% endif %}"
         {% if page.lang %}lang="{{ page.lang }}" dir="{{ page.lang | replace: 'ar', 'rtl' | replace: 'en', 'ltr' }}"{% endif %}>
      {{ content }}
    </div>

  </div>
</div>
