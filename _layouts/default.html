<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ar' }}" dir="{{ page.lang | default: 'ar' | replace: 'ar', 'rtl' | replace: 'en', 'ltr' | replace: 'fr', 'ltr' }}">
<head>
  
  <meta name="algolia-site-verification"  content="66F320FFCC865600" />
  <link rel="stylesheet" href="https://unpkg.com/@algolia/sitesearch@latest/dist/search.min.css" />
<script src="https://unpkg.com/@algolia/sitesearch@latest/dist/search.min.js"></script>
  
 {% include head.html %}
</head>
<body class="{% if page.lang == 'ar' or page.lang == nil %}rtl{% endif %}">

  
<div id="search"></div>
<script>
  SiteSearch.init({
    container: "#search",
    applicationId: "UOKFCFE2P9",
    apiKey: "72e26b1e40a835929f864eb463bf5fe8",
    indexName: "artsmoroccan_me_uokfcfe2p9_pages",
    attributes: {
      primaryText: "content", // the attribute to display in the hits list
      secondaryText: "title", // the secondary attribute to display in the hits list
      tertiaryText: "path", // the tertiary attribute to display in the hits list
      url: "", // the URL of the hit
      image: "hostname" // the image URL of the hit
    },
    darkMode: false,
  });
</script>
  
  <!-- مؤشر تقدم القراءة | Reading Progress -->
  {% if page.layout == 'post' %}
  <div class="reading-progress" id="reading-progress" role="progressbar" aria-label="تقدم القراءة" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
  {% endif %}

  <!-- موقع الغلاف | Site Wrapper -->
  <div class="site-wrapper">

    <!-- الهيدر | Header -->
    {% include header.html %}

    <!-- المحتوى الرئيسي | Main Content -->
    <main class="site-main" id="main-content" tabindex="-1">
      {{ content }}
    </main>

    <!-- الفوتر | Footer -->
    {% include footer.html %}

  </div>

  <!-- سكريبت JS | JavaScript -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

</body>
</html>
