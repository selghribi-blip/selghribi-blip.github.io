<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Extractor</title>
  <link rel="stylesheet" href="tailwind.css" />
</head>

<body class="bg-slate-950 text-slate-100">
  <div class="w-[360px] max-w-[360px] p-4">
    <div class="flex items-center justify-between gap-3">
      <div>
        <h1 class="text-lg font-bold leading-tight">Email Extractor</h1>
        <p class="text-xs text-slate-400">Scan page → copy or export CSV</p>
      </div>
      <span id="statusBadge" class="text-xs px-2 py-1 rounded-full bg-slate-800 text-slate-200 border border-slate-700">
        Idle
      </span>
    </div>

    <div class="mt-3 flex items-center gap-2">
      <label class="flex items-center gap-2 text-xs text-slate-300">
        <input id="includeMailto" type="checkbox" class="accent-cyan-400" checked />
        Include mailto links
      </label>
    </div>

    <div class="mt-3 grid grid-cols-2 gap-2">
      <button id="scanBtn" class="col-span-2 rounded-xl bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 font-semibold py-2 hover:opacity-95 active:opacity-90">
        Scan page
      </button>

      <button id="copyBtn" class="rounded-xl bg-slate-900 border border-slate-700 py-2 text-sm hover:bg-slate-800 disabled:opacity-40" disabled>
        Copy
      </button>
      <button id="downloadBtn" class="rounded-xl bg-slate-900 border border-slate-700 py-2 text-sm hover:bg-slate-800 disabled:opacity-40" disabled>
        Download CSV
      </button>

      <button id="clearBtn" class="col-span-2 rounded-xl bg-slate-900 border border-slate-700 py-2 text-sm hover:bg-slate-800">
        Clear
      </button>
    </div>

    <div class="mt-4 rounded-2xl border border-slate-800 bg-slate-900/40 p-3">
      <div class="flex items-center justify-between">
        <p class="text-sm font-semibold">Results</p>
        <p class="text-xs text-slate-400"><span id="count">0</span> emails</p>
      </div>

      <div class="mt-2">
        <input id="filterInput" class="w-full rounded-xl bg-slate-950 border border-slate-800 px-3 py-2 text-sm outline-none focus:border-cyan-400"
               placeholder="Filter (type to search)" />
      </div>

      <div class="mt-3 max-h-56 overflow-auto rounded-xl border border-slate-800 bg-slate-950">
        <ul id="list" class="divide-y divide-slate-800"></ul>
      </div>

      <p id="note" class="mt-2 text-xs text-slate-400"></p>
    </div>

    <p class="mt-3 text-[11px] text-slate-500">
      Tip: Use it for lead generation and outreach (respect privacy &amp; laws).
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
