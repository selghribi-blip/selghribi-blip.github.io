<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Extractor</title>
  <link rel="stylesheet" href="tailwind.css" />
</head>

<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-200">
  <div class="w-[380px] max-w-[380px] p-4">

    <!-- Header -->
    <div class="flex items-center justify-between gap-2">
      <div>
        <h1 class="text-base font-bold leading-tight">Email Extractor</h1>
        <p class="text-[11px] text-slate-500 dark:text-slate-400">Scan page → copy or export</p>
      </div>
      <div class="flex items-center gap-2">
        <span id="statusBadge" class="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700">
          Idle
        </span>
        <!-- Theme toggle -->
        <button id="themeToggle" title="Toggle dark/light mode"
          class="flex items-center justify-center w-8 h-8 rounded-full border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span id="themeIcon" class="text-base leading-none select-none">🌙</span>
        </button>
      </div>
    </div>

    <!-- Options row -->
    <div class="mt-3 flex flex-wrap items-center gap-x-4 gap-y-1.5">
      <label class="flex items-center gap-1.5 text-xs text-slate-600 dark:text-slate-300 cursor-pointer select-none">
        <input id="includeMailto" type="checkbox" class="accent-cyan-500" checked />
        Include mailto links
      </label>
      <label class="flex items-center gap-1.5 text-xs text-slate-600 dark:text-slate-300 cursor-pointer select-none">
        <input id="ignoreGenerics" type="checkbox" class="accent-cyan-500" />
        Ignore generic emails
      </label>
    </div>

    <!-- Generic prefixes editor (hidden by default) -->
    <div id="genericsPrefixPanel" class="hidden mt-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 p-2">
      <p class="text-[10px] text-slate-500 dark:text-slate-400 mb-1">Comma-separated prefixes to ignore:</p>
      <textarea id="genericPrefixes" rows="2"
        class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 px-2 py-1 text-xs text-slate-800 dark:text-slate-200 outline-none focus:border-cyan-500 resize-none"></textarea>
      <button id="savePrefixes" class="mt-1 text-[10px] px-2 py-0.5 rounded-lg bg-cyan-500 text-white hover:bg-cyan-600">Save</button>
    </div>

    <!-- Action buttons -->
    <div class="mt-3 grid grid-cols-2 gap-2">
      <button id="scanBtn"
        class="col-span-2 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-semibold py-2 text-sm hover:opacity-90 active:opacity-80 transition-opacity">
        Scan page
      </button>

      <button id="copyBtn"
        class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 py-2 text-sm hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-40 transition-colors"
        disabled>
        Copy all
      </button>

      <button id="downloadCsvBtn"
        class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 py-2 text-sm hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-40 transition-colors"
        disabled>
        Download CSV
      </button>

      <button id="downloadJsonBtn"
        class="rounded-xl border border-cyan-300 dark:border-cyan-700 bg-cyan-50 dark:bg-cyan-950 py-2 text-sm text-cyan-700 dark:text-cyan-300 hover:bg-cyan-100 dark:hover:bg-cyan-900 disabled:opacity-40 transition-colors"
        disabled>
        Download JSON
      </button>

      <button id="clearBtn"
        class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 py-2 text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
        Clear
      </button>
    </div>

    <!-- Results panel -->
    <div class="mt-4 rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 p-3">
      <div class="flex items-center justify-between">
        <p class="text-sm font-semibold text-slate-800 dark:text-slate-200">Results</p>
        <p class="text-xs text-slate-500 dark:text-slate-400"><span id="count">0</span> emails</p>
      </div>

      <div class="mt-2">
        <input id="filterInput"
          class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 px-3 py-1.5 text-sm text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 outline-none focus:border-cyan-500"
          placeholder="Filter results…" />
      </div>

      <div class="mt-2 max-h-52 overflow-auto rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
        <ul id="list" class="divide-y divide-slate-100 dark:divide-slate-900"></ul>
      </div>

      <p id="note" class="mt-2 text-xs text-slate-500 dark:text-slate-400 min-h-[1.25rem]"></p>
    </div>

    <p class="mt-3 text-[10px] text-slate-400 dark:text-slate-600">
      Scans current page only. No data is sent to any server.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
